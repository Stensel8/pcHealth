version: 2

# Dependency update strategy:
#
#   Dependabot  ->  GitHub Actions uses: owner/repo@sha  (.github/workflows/)
#                   NuGet packages — security advisories  (src/GUI/pcHealth/)
#
#   Renovate    ->  NuGet packages — regular bumps, grouping, automerge
#                   docker:// action images (e.g. rhysd/actionlint)
#                   (see renovate.json at the repo root)
#
# NuGet is covered by both intentionally:
#   - Dependabot fires on GitHub Security Advisories (vulnerability alerts).
#   - Renovate handles scheduled bumps with grouping and automerge.
# If both open a PR for the same update, merge Renovate's and close Dependabot's.

updates:
  # GitHub Actions
  # Dependabot checks weekly whether action versions in
  # .github/workflows/ can be updated.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "ci"
    assignees:
      - "Stensel8"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "actions/*"
      security-actions:
        patterns:
          - "aquasecurity/*"
          - "github/codeql-action"
          - "microsoft/*"
          - "trufflesecurity/*"
      third-party-actions:
        patterns:
          - "DavidAnson/*"
          - "lycheeverse/*"
          - "amannn/*"
          - "webiny/*"

  # NuGet packages (Windows App SDK + .NET BCL)
  # Dependabot picks up GitHub Security Advisory vulnerabilities for NuGet.
  # Renovate handles regular version bumps with grouping (see renovate.json).
  - package-ecosystem: "nuget"
    directory: "/src/GUI/pcHealth"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "dotnet"
    assignees:
      - "Stensel8"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      windows-app-sdk:
        patterns:
          - "Microsoft.WindowsAppSDK"
          - "Microsoft.Windows.SDK.*"
      dotnet-bcl:
        patterns:
          - "System.*"
          - "Microsoft.Management.*"
