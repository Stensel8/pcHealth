name: Dependency Review

on:
  pull_request:
    branches: ["main"]

# Default minimal permissions — each job overrides only what it needs.
permissions: read-all

# ----------------------------------------------------------
# DEPENDENCY REVIEW
# Compares the dependency diff of a pull request against known
# vulnerability databases. Blocks merging if HIGH or CRITICAL
# vulnerabilities are introduced by a dependency change.
# ----------------------------------------------------------

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Review dependencies
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
