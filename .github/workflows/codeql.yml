name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '0 4 * * 1'  # Every Monday at 04:00 UTC

# Default minimal permissions — each job overrides only what it needs.
permissions: read-all

# ============================================================
# Overview of checks:
#
#  analyze-csharp   → CodeQL static analysis on the WinUI 3 C# app
#  analyze-actions  → CodeQL static analysis on GitHub Actions workflows
# ============================================================

jobs:

  # ----------------------------------------------------------
  # CSHARP ANALYSIS
  # Manual build mode: restores and builds the WinUI 3 project
  # so CodeQL can trace the compiled output.
  # Must run on Windows because the TFM is windows-only.
  # ----------------------------------------------------------
  analyze-csharp:
    name: Analyze C# (CodeQL)
    runs-on: windows-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET 10
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          languages: csharp
          build-mode: manual

      - name: Build for CodeQL
        run: dotnet build "Windows 11/GUI/pcHealth/pcHealth.csproj" -c Release

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          category: "/language:csharp"

  # ----------------------------------------------------------
  # GITHUB ACTIONS ANALYSIS
  # Scans workflow YAML files for logic errors and misconfigurations.
  # ----------------------------------------------------------
  analyze-actions:
    name: Analyze GitHub Actions (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          languages: actions
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          category: "/language:actions"
