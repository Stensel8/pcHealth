rules:

  # ════════════════════════════════════════════════════════════════════
  # PowerShell 7 — patterns not covered by PSScriptAnalyzer
  # (PSScriptAnalyzer already flags Get-WmiObject and Invoke-Expression)
  # ════════════════════════════════════════════════════════════════════

  - id: ps002-wmic-exe
    pattern-regex: '\bwmic\b'
    message: >
      wmic.exe is removed in Windows 11 25H2.
      Replace with Get-CimInstance queries.
    languages: [generic]
    severity: ERROR
    paths:
      include: ["*.ps1"]
    metadata: {category: deprecated}

  - id: ps005-global-error-action-preference
    pattern-regex: '\$ErrorActionPreference\s*=\s*[''"]SilentlyContinue[''"]'
    message: >
      Global $ErrorActionPreference = SilentlyContinue masks real errors.
      Use -ErrorAction SilentlyContinue per cmdlet instead.
    languages: [generic]
    severity: WARNING
    paths:
      include: ["*.ps1"]
    metadata: {category: correctness}

  - id: ps006-set-strict-mode-off
    pattern-regex: '(?i)Set-StrictMode\s+-Off'
    message: >
      Set-StrictMode -Off removes undefined-variable detection.
      Only disable with a documented reason.
    languages: [generic]
    severity: WARNING
    paths:
      include: ["*.ps1"]
    metadata: {category: quality}

  - id: ps007-legacy-web-client
    pattern-regex: '\[System\.Net\.WebClient\]'
    message: >
      [System.Net.WebClient] is deprecated.
      Use Invoke-RestMethod or Invoke-WebRequest instead.
    languages: [generic]
    severity: WARNING
    paths:
      include: ["*.ps1"]
    metadata: {category: deprecated}

  - id: ps008-plaintext-secure-string
    pattern-regex: 'ConvertTo-SecureString.{0,80}-AsPlainText|-AsPlainText.{0,80}ConvertTo-SecureString'
    message: >
      ConvertTo-SecureString -AsPlainText stores a credential in plain text.
      Use Get-Credential, a secrets vault, or environment variables instead.
    languages: [generic]
    severity: WARNING
    paths:
      include: ["*.ps1"]
    metadata: {category: security}

  # ════════════════════════════════════════════════════════════════════
  # Bash — patterns not covered by ShellCheck
  # ════════════════════════════════════════════════════════════════════

  - id: sh003-curl-pipe-shell
    pattern-regex: 'curl.{0,80}\|\s*(ba)?sh\b'
    message: >
      curl | bash executes untrusted remote code directly.
      Download to a file, verify integrity (checksum/signature), then execute.
    languages: [generic]
    severity: ERROR
    paths:
      include: ["*.sh"]
    metadata: {category: security}

  - id: sh004-chmod-777
    pattern-regex: 'chmod\s+777\b'
    message: >
      chmod 777 grants world-writable permissions — a security risk.
      Use the minimum required permissions (755 for executables, 644 for files).
    languages: [generic]
    severity: WARNING
    paths:
      include: ["*.sh"]
    metadata: {category: security}
