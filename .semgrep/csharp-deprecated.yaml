rules:

  # ── Legacy WMI ─────────────────────────────────────────────────────────

  - id: cs001-management-object-searcher
    pattern: new ManagementObjectSearcher(...)
    message: >
      ManagementObjectSearcher uses DCOM (legacy WMI).
      Replace with CimSession.QueryInstances() from Microsoft.Management.Infrastructure.
    languages: [csharp]
    severity: WARNING
    metadata: {category: deprecated}

  - id: cs001b-system-management-import
    pattern-regex: 'using\s+System\.Management[^.]'
    message: >
      System.Management import — uses DCOM under the hood.
      Replace with Microsoft.Management.Infrastructure (CIM/WSMan).
    languages: [csharp]
    severity: WARNING
    metadata: {category: deprecated}

  # ── Exception handling ──────────────────────────────────────────────────

  - id: cs003-empty-catch
    pattern-regex: '(?m)^\s*catch\s*\{'
    message: >
      Empty catch block swallows exceptions silently.
      Always log or surface: catch (SpecificException ex) { Debug.WriteLine(ex); }
    languages: [csharp]
    severity: ERROR
    metadata: {category: correctness}

  - id: cs004-bare-catch-exception
    pattern: |
      try { ... }
      catch (Exception) { ... }
    message: >
      Bare catch(Exception) — use a specific type instead
      (IOException, UnauthorizedAccessException, COMException, etc.).
    languages: [csharp]
    severity: WARNING
    metadata: {category: correctness}

  - id: cs005-throw-bare-exception
    pattern: throw new Exception(...)
    message: >
      throw new Exception(...) — throw a specific type instead
      (InvalidOperationException, ArgumentException, IOException, etc.).
    languages: [csharp]
    severity: WARNING
    metadata: {category: correctness}

  # ── Path handling ───────────────────────────────────────────────────────

  - id: cs006-raw-path-concat
    pattern-regex: '\+\s*"\\\\'
    message: >
      Raw backslash path concatenation — use Path.Combine(dir, file) instead.
    languages: [csharp]
    severity: WARNING
    metadata: {category: correctness}

  - id: cs007-hardcoded-drive-path
    pattern-regex: '@"[A-Za-z]:\\'
    message: >
      Hardcoded drive-root path (e.g. C:\) breaks on machines with different layouts.
      Use AppContext.BaseDirectory, Environment.GetFolderPath, or Path.Combine.
    languages: [csharp]
    severity: WARNING
    metadata: {category: correctness}

  # ── Async / threading ───────────────────────────────────────────────────

  - id: cs008-sync-over-async-wait
    pattern: $TASK.Wait()
    message: >
      .Wait() blocks the calling thread and deadlocks the WinUI 3 UI thread.
      Use await instead.
    languages: [csharp]
    severity: ERROR
    metadata: {category: correctness}

  - id: cs008b-sync-over-async-getresult
    pattern: $TASK.GetAwaiter().GetResult()
    message: >
      .GetAwaiter().GetResult() is sync-over-async and deadlocks the UI thread.
      Use await instead.
    languages: [csharp]
    severity: ERROR
    metadata: {category: correctness}

  - id: cs009-thread-sleep
    pattern: Thread.Sleep(...)
    message: >
      Thread.Sleep blocks the thread (including the UI thread).
      Use await Task.Delay(ms) in async methods.
    languages: [csharp]
    severity: WARNING
    metadata: {category: performance}

  - id: cs010-raw-thread-creation
    pattern: new Thread(...)
    message: >
      new Thread() bypasses the thread pool. Use Task.Run for CPU-bound work.
    languages: [csharp]
    severity: INFO
    metadata: {category: performance}

  # ── Memory ──────────────────────────────────────────────────────────────

  - id: cs011-manual-gc-collect
    pattern: GC.Collect()
    message: >
      GC.Collect() disrupts GC heuristics and hurts throughput.
      Fix the allocation pattern instead.
    languages: [csharp]
    severity: WARNING
    metadata: {category: performance}

  # ── Output / logging ────────────────────────────────────────────────────

  - id: cs012-console-write-in-gui
    patterns:
      - pattern: Console.WriteLine(...)
      - pattern: Console.Write(...)
    message: >
      WinUI 3 apps have no console window — Console output is silently dropped.
      Use Debug.WriteLine or a structured logger.
    languages: [csharp]
    severity: WARNING
    metadata: {category: correctness}

  # ── Time ────────────────────────────────────────────────────────────────

  - id: cs013-datetime-now
    pattern: DateTime.Now
    message: >
      DateTime.Now includes the local timezone offset.
      Use DateTime.UtcNow or DateTimeOffset.UtcNow for timestamps and logging.
    languages: [csharp]
    severity: INFO
    metadata: {category: correctness}

  # ── WinUI 3 / UWP API issues ────────────────────────────────────────────

  - id: cs014-old-uwp-xaml-namespace
    pattern-regex: 'Windows\.UI\.Xaml'
    message: >
      Windows.UI.Xaml is the UWP namespace. WinUI 3 uses Microsoft.UI.Xaml.
      Mixing namespaces causes runtime failures.
    languages: [csharp]
    severity: ERROR
    metadata: {category: deprecated}

  - id: cs015-deprecated-application-view
    pattern-regex: '\bApplicationView\b'
    message: >
      ApplicationView is a deprecated UWP API not available in WinUI 3.
      Use Microsoft.UI.Windowing.AppWindow instead.
    languages: [csharp]
    severity: ERROR
    metadata: {category: deprecated}

  - id: cs016-deprecated-core-window
    pattern-regex: '\bCoreWindow\b'
    message: >
      CoreWindow does not exist in WinUI 3 Desktop.
      Use Microsoft.UI.Xaml.Window or AppWindow instead.
    languages: [csharp]
    severity: ERROR
    metadata: {category: deprecated}

  - id: cs017-deprecated-dispatcher-run-async
    pattern: $X.RunAsync(...)
    message: >
      CoreDispatcher.RunAsync is the UWP API.
      Use DispatcherQueue.TryEnqueue in WinUI 3.
    languages: [csharp]
    severity: ERROR
    metadata: {category: deprecated}

  # ── Code quality ────────────────────────────────────────────────────────

  - id: cs018-pragma-warning-disable
    pattern-regex: '#pragma\s+warning\s+disable'
    message: >
      #pragma warning disable suppresses compiler diagnostics.
      Fix the underlying issue instead of silencing the warning.
    languages: [csharp]
    severity: INFO
    metadata: {category: quality}

  - id: cs019-dynamic-keyword
    pattern-regex: '\bdynamic\b'
    message: >
      dynamic bypasses static type checking.
      Use specific types, generics, or pattern matching instead.
    languages: [csharp]
    severity: INFO
    metadata: {category: quality}
